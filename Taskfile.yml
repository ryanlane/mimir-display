# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

vars:
  VENV: .venv
  PYTHON: "{{.VENV}}/bin/python"
  SERVICE: mimir-display

tasks:

  default:
    desc: List all available tasks
    cmds:
      - task --list

  # ============================================================================
  # SETUP
  # ============================================================================

  install:
    desc: Create venv and install all dependencies
    cmds:
      - python3 -m venv {{.VENV}}
      - "{{.PYTHON}} -m pip install --upgrade pip wheel setuptools"
      - "{{.PYTHON}} -m pip install -e '.[dev]'"

  install:pi:
    desc: Install on a Raspberry Pi (includes inky + qrcode extras)
    cmds:
      - python3 -m venv {{.VENV}}
      - "{{.PYTHON}} -m pip install --upgrade pip wheel setuptools"
      - "{{.PYTHON}} -m pip install -e '.[inky,qrcode]'"

  # ============================================================================
  # RUN
  # ============================================================================

  run:
    desc: Run the display client locally (uses .env if present)
    cmds:
      - "{{.PYTHON}} -m mimir_display"

  run:dev:
    desc: Run with debug logging
    env:
      LOG_LEVEL: DEBUG
    cmds:
      - "{{.PYTHON}} -m mimir_display"

  # ============================================================================
  # LINT / FORMAT / TEST
  # ============================================================================

  lint:
    desc: Run ruff + mypy
    cmds:
      - "{{.VENV}}/bin/ruff check mimir_display/"
      - "{{.VENV}}/bin/mypy mimir_display/"

  format:
    desc: Auto-format with ruff + black + isort
    cmds:
      - "{{.VENV}}/bin/ruff check --fix mimir_display/"
      - "{{.VENV}}/bin/black mimir_display/"
      - "{{.VENV}}/bin/isort mimir_display/"

  test:
    desc: Run the test suite
    cmds:
      - "{{.PYTHON}} -m pytest tests/"

  test:verbose:
    desc: Run tests with verbose output
    cmds:
      - "{{.PYTHON}} -m pytest tests/ -v"

  # ============================================================================
  # DEPLOY  — push code to a physical display
  # ============================================================================

  deploy:
    desc: "Deploy to a display over SSH (usage: task deploy -- user@host)"
    summary: |
      Rsyncs the repo to /opt/mimir-display on the target and runs update_display.sh.
      Preserves the existing .env on the device.

      Uses SSH ControlMaster so all three connections (mkdir, rsync, install) share
      one authenticated session — you are prompted for a password at most once.
      Set up SSH key auth to eliminate the prompt entirely:
        ssh-keygen -t ed25519          # if you don't have a key yet
        ssh-copy-id user@host
    cmds:
      - |
        TARGET={{.CLI_ARGS}}
        if [ -z "$TARGET" ]; then echo "Usage: task deploy -- user@host"; exit 1; fi
        STAGE_DIR="/tmp/mimir-display-deploy-${USER}"
        SOCK="/tmp/mimir-deploy-ctl-${USER}-$$"
        SSH_OPTS="-o ControlMaster=auto -o ControlPath=${SOCK} -o ControlPersist=60"
        cleanup() { ssh -O exit -o ControlPath=${SOCK} ${TARGET} 2>/dev/null || true; }
        trap cleanup EXIT
        echo "Deploying to $TARGET..."
        ssh ${SSH_OPTS} ${TARGET} "mkdir -p ${STAGE_DIR}"
        rsync -az --delete --no-owner --no-group \
          -e "ssh ${SSH_OPTS}" \
          --exclude .venv --exclude .venv-ci --exclude __pycache__ --exclude .git --exclude .env \
          --exclude .pytest_cache --exclude .ruff_cache --exclude .vscode --exclude htmlcov \
          --exclude mimir_display.egg-info \
          ./ ${TARGET}:${STAGE_DIR}/
        ssh ${SSH_OPTS} ${TARGET} "sudo mkdir -p /opt/mimir-display && sudo rsync -a --delete --exclude .env --exclude .venv ${STAGE_DIR}/ /opt/mimir-display/ && rm -rf ${STAGE_DIR} && cd /opt/mimir-display && sudo bash scripts/update_display.sh"
        echo "Deploy complete."

  deploy:dry:
    desc: "Dry-run deploy (shows what would change, no writes)"
    cmds:
      - |
        TARGET={{.CLI_ARGS}}
        if [ -z "$TARGET" ]; then echo "Usage: task deploy:dry -- user@host"; exit 1; fi
        STAGE_DIR="/tmp/mimir-display-deploy-${USER}"
        SOCK="/tmp/mimir-deploy-ctl-${USER}-$$"
        SSH_OPTS="-o ControlMaster=auto -o ControlPath=${SOCK} -o ControlPersist=60"
        trap "ssh -O exit -o ControlPath=${SOCK} ${TARGET} 2>/dev/null || true" EXIT
        echo "Dry-run: local -> ${TARGET}:${STAGE_DIR}/"
        rsync -azn --delete --no-owner --no-group \
          -e "ssh ${SSH_OPTS}" \
          --exclude .venv --exclude .venv-ci --exclude __pycache__ --exclude .git --exclude .env \
          --exclude .pytest_cache --exclude .ruff_cache --exclude .vscode --exclude htmlcov \
          --exclude mimir_display.egg-info \
          ./ ${TARGET}:${STAGE_DIR}/
        echo "Note: this dry-run validates upload only; privileged sync into /opt/mimir-display runs in deploy."

  # ============================================================================
  # REMOTE  — interact with a running display
  # ============================================================================

  logs:
    desc: "Stream logs from a display (usage: task logs -- pi@host)"
    cmds:
      - ssh {{.CLI_ARGS}} "journalctl -u {{.SERVICE}} -f"

  status:
    desc: "Show service status (usage: task status -- pi@host)"
    cmds:
      - ssh {{.CLI_ARGS}} "systemctl status {{.SERVICE}}"

  restart:
    desc: "Restart the service on a display (usage: task restart -- pi@host)"
    cmds:
      - ssh {{.CLI_ARGS}} "sudo systemctl restart {{.SERVICE}}"

  ssh:
    desc: "Open an SSH session (usage: task ssh -- pi@host)"
    cmds:
      - ssh {{.CLI_ARGS}}

  reset:
    desc: "Reset a display to factory-unpaired state and restart (usage: task reset -- pi@host)"
    summary: |
      Deletes all server-assigned pairing data from the display so it boots as
      a fresh unconfigured device (provisioning server + QR code on screen).

      Removes:
        - device_config.json      — server-assigned MQTT / platform credentials
        - registration_state.json — MQTT registration pair state
        - mqtt_state.json         — runtime scene / URL override state
        - device_state.json       — scene assignment persistence

      State dirs checked (same precedence as the client code):
        $MIMIR_STATE_DIR, /var/lib/mimir-display, ~/.mimir, <data_dir>

      The service is restarted after the files are removed.
    prompt: "This will wipe all pairing data on the display and restart it. Continue?"
    cmds:
      - |
        TARGET={{.CLI_ARGS}}
        if [ -z "$TARGET" ]; then echo "Usage: task reset -- user@host"; exit 1; fi
        echo "Resetting $TARGET to unpaired state..."
        ssh ${TARGET} bash -s << 'ENDSSH'
          set -e
          FILES=(
            "/var/lib/mimir-display/device_config.json"
            "/var/lib/mimir-display/registration_state.json"
            "${HOME}/.mimir/device_config.json"
            "${HOME}/.mimir/registration_state.json"
          )
          # Also clear data-dir state files (default location)
          DATA_DIRS=(
            "/var/lib/mimir-display"
            "${HOME}/.mimir"
            "/opt/mimir-display/data"
          )
          for dir in "${DATA_DIRS[@]}"; do
            FILES+=("${dir}/mqtt_state.json" "${dir}/device_state.json")
          done
          removed=0
          for f in "${FILES[@]}"; do
            if [ -f "$f" ]; then
              sudo rm -f "$f" && echo "  Removed: $f" && removed=$((removed+1))
            fi
          done
          echo "  Removed $removed file(s)."
          sudo systemctl restart mimir-display
          echo "  Service restarted — display will boot as unconfigured."
        ENDSSH

  purge:
    desc: "Completely remove mimir-display from a device (usage: task purge -- user@host)"
    summary: |
      Removes the deployed install, systemd unit overrides, persisted state,
      caches, and the mimir-display service so the device can be reinstalled
      from scratch.

      Removes:
        - /opt/mimir-display
        - /var/lib/mimir-display
        - ~/.mimir
        - /etc/systemd/system/mimir-display.service.d

      Then reloads systemd and resets failed service state.
    prompt: "This will fully remove mimir-display from the target device. Continue?"
    cmds:
      - |
        TARGET={{.CLI_ARGS}}
        if [ -z "$TARGET" ]; then echo "Usage: task purge -- user@host"; exit 1; fi
        echo "Purging mimir-display from $TARGET..."
        ssh ${TARGET} bash -s << 'ENDSSH'
          set -e
          sudo systemctl stop mimir-display 2>/dev/null || true
          sudo systemctl disable mimir-display 2>/dev/null || true
          sudo rm -rf /opt/mimir-display
          sudo rm -rf /var/lib/mimir-display
          sudo rm -rf /etc/systemd/system/mimir-display.service.d
          rm -rf "${HOME}/.mimir"
          sudo systemctl daemon-reload
          sudo systemctl reset-failed mimir-display 2>/dev/null || true
          echo "  Removed install dir, state, and service overrides."
          echo "  If you created a custom base unit outside this repo, remove it manually:"
          echo "    /etc/systemd/system/mimir-display.service"
          echo "    /lib/systemd/system/mimir-display.service"
        ENDSSH

  reinstall:clean:
    desc: "Purge then redeploy to a display (usage: task reinstall:clean -- user@host)"
    summary: |
      Performs a full clean reinstall sequence on the target:
        1) task purge -- user@host
        2) task deploy -- user@host
    prompt: "This will purge and then redeploy mimir-display on the target. Continue?"
    cmds:
      - |
        TARGET={{.CLI_ARGS}}
        if [ -z "$TARGET" ]; then echo "Usage: task reinstall:clean -- user@host"; exit 1; fi
        task purge -- "$TARGET"
        task deploy -- "$TARGET"

  # ============================================================================
  # CLEAN
  # ============================================================================

  clean:
    desc: Remove Python cache files
    cmds:
      - find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
      - find . -type f -name "*.pyc" -delete 2>/dev/null || true
      - find . -type d -name ".pytest_cache" -exec rm -rf {} + 2>/dev/null || true

  clean:all:
    desc: Remove venv and all caches
    prompt: This will delete the .venv. Continue?
    cmds:
      - task: clean
      - rm -rf {{.VENV}}
