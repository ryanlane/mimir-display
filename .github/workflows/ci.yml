name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Lint + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          pip install -e .
          pip install ruff pytest
      - name: Ruff
        run: ruff check mimir_display/
      - name: Tests
        run: pytest tests/ -x -q
